version: "3.8"

services:
  opc200-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    volumes:
      - ./coverage:/app/coverage
    environment:
      - PYTHONPATH=/app/src
      - CI=true
    command: pytest -v --cov=src --cov-report=xml --cov-report=html:/app/coverage/html

  qdrant-test:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_test_storage:/qdrant/storage

volumes:
  qdrant_test_storage:
