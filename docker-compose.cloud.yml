# OPC200 云端多租户部署编排
# 目标: 1套共享基础设施支持多个 OPC 租户
# 租户隔离: Gateway-per-tenant + 独立数据卷
# 共享服务: Qdrant(cluster) + Prometheus + Grafana + Backup
#
# 使用说明:
#   export TENANT_ID=opc001
#   docker-compose -f docker-compose.cloud.yml -p opc200-cloud up -d

version: "3.8"

x-gateway-base: &gateway-base
  build:
    context: .
    dockerfile: Dockerfile.gateway
  restart: unless-stopped
  environment:
    - OPC200_GATEWAY_TOKEN=${OPC200_GATEWAY_TOKEN}
    - OPC200_DATA_DIR=/data
    - OPC200_MODE=cloud
    - OPC200_TENANT_ID=${TENANT_ID}
  networks:
    - opc200-cloud
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - SETGID
    - SETUID
  read_only: true
  tmpfs:
    - /tmp:noexec,nosuid,size=100m

services:
  # ============================================
  # 租户 Gateway (通过 docker-compose override 扩展多个租户)
  # ============================================
  gateway:
    <<: *gateway-base
    container_name: opc200-gateway-${TENANT_ID:-default}
    ports:
      - "${GATEWAY_PORT:-18789}:18789"
    volumes:
      - gateway-data-${TENANT_ID:-default}:/data
      - ./config/gateway.yml:/etc/opc200/gateway.yml:ro
      - ./logs/gateway/${TENANT_ID:-default}:/var/log/opc200

  # ============================================
  # 共享基础设施
  # ============================================

  # 向量数据库 - 多租户隔离通过 collection 前缀实现
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: opc200-qdrant-cloud
    restart: unless-stopped
    volumes:
      - qdrant-cloud-data:/qdrant/storage
    networks:
      - opc200-cloud
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      # 启用多租户级别的API key验证 (可选)
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus - 抓取所有租户 Gateway 的指标
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: opc200-prometheus-cloud
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.cloud.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-cloud-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - opc200-cloud
    ports:
      - "9090:9090"

  # Grafana - 统一监控面板
  grafana:
    image: grafana/grafana:10.3.1
    container_name: opc200-grafana-cloud
    restart: unless-stopped
    volumes:
      - grafana-cloud-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources.cloud.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - opc200-cloud
    ports:
      - "3000:3000"

  # 共享备份服务 - 按需运行，备份所有租户数据到 S3/B2
  backup:
    build:
      context: .
      dockerfile: Dockerfile.journal
    container_name: opc200-backup-cloud
    restart: "no"
    volumes:
      - ./scripts/maintenance:/scripts:ro
      - ./backups:/backups
      # 所有租户的数据卷通过 external 方式挂载
      - type: bind
        source: /var/lib/docker/volumes
        target: /host_volumes
        read_only: true
    environment:
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
      - BACKUP_ENCRYPT=${BACKUP_ENCRYPT:-true}
      - BACKUP_PASSWORD=${BACKUP_PASSWORD}
      - BACKUP_DESTINATION=${BACKUP_DESTINATION:-s3}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
    command: python /scripts/backup_cloud.py --shared-mode
    networks:
      - opc200-cloud
    profiles:
      - backup

  # 路由/入口 (可选) - 用于子域名路由到不同租户 Gateway
  # 例如: opc001.opc200.co → gateway:18789
  # traefik:
  #   image: traefik:v2.11
  #   ...

networks:
  opc200-cloud:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

volumes:
  gateway-data-default:
    driver: local
  qdrant-cloud-data:
    driver: local
  prometheus-cloud-data:
    driver: local
  grafana-cloud-data:
    driver: local
