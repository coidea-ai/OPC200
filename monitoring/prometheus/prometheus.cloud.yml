# OPC200 Cloud Multi-Tenant Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Auto-discover all tenant Gateway instances via Docker DNS
  # In production, use file_sd_configs or Consul for dynamic discovery
  - job_name: 'opc200-gateways'
    dns_sd_configs:
      - names:
          - gateway  # docker-compose service name
        type: A
        port: 9091
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__meta_dns_name]
        target_label: job
      - source_labels: [__meta_dns_name]
        regex: 'gateway'
        target_label: tenant_type
        replacement: 'cloud'

  # Qdrant shared cluster
  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
    metrics_path: /metrics
