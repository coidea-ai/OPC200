[pytest]
minversion = 7.0
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    -m "not integration"
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may use real services)
    e2e: End-to-end tests (slowest, full user journeys)
    slow: Slow tests that should be run selectively
    security: Security-related tests
    asyncio: Async tests
    database: Tests that require database
    qdrant: Tests that require Qdrant vector store
    performance: Performance and load tests

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Async mode
asyncio_mode = auto
