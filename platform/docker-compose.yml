# OPC200 服务编排
# 完整的服务栈：Gateway + Journal + Security + Monitoring

version: "3.8"

services:
  # OpenClaw Gateway
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: opc200-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"  # 仅绑定到本地
    volumes:
      - gateway-data:/data
      - ./config/gateway.yml:/etc/opc200/gateway.yml:ro
      - ./logs/gateway:/var/log/opc200
    environment:
      - OPC200_GATEWAY_TOKEN=${OPC200_GATEWAY_TOKEN}
      - OPC200_DATA_DIR=/data
    networks:
      - opc200-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

  # Journal 服务
  journal:
    build:
      context: .
      dockerfile: Dockerfile.journal
    container_name: opc200-journal
    restart: unless-stopped
    volumes:
      - journal-data:/data/journal
      - ./config/skills.yml:/app/config/skills.yml:ro
      - ./logs/journal:/var/log/opc200
    environment:
      - OPC200_DATA_DIR=/data
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_HOST=qdrant
    networks:
      - opc200-internal
    depends_on:
      - qdrant
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 向量数据库 (Qdrant)
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: opc200-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - opc200-internal
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333

  # Tailscale 客户端
  tailscale:
    image: tailscale/tailscale:v1.58
    container_name: opc200-tailscale
    restart: unless-stopped
    volumes:
      - tailscale-data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    networks:
      - opc200-internal
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ACCEPT_DNS=true
    command: tailscaled

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: opc200-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - opc200-internal
    ports:
      - "127.0.0.1:9090:9090"  # 仅本地访问
    depends_on:
      - metrics-server

  # Metrics Server - Prometheus metrics endpoint
  metrics-server:
    build:
      context: .
      dockerfile: Dockerfile.journal
    container_name: opc200-metrics-server
    restart: unless-stopped
    volumes:
      - ./src:/app/src:ro
      - ./config:/app/config:ro
    environment:
      - OPC200_DATA_DIR=/data
      - PYTHONPATH=/app/src
    networks:
      - opc200-internal
    ports:
      - "127.0.0.1:9091:9091"  # 仅本地访问
    command: python /app/src/api/metrics_server.py --port 9091 --host 0.0.0.0 --with-app-metrics
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9091/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana 可视化
  grafana:
    image: grafana/grafana:10.3.1
    container_name: opc200-grafana
    restart: unless-stopped
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
    networks:
      - opc200-internal
    ports:
      - "127.0.0.1:3000:3000"  # 仅本地访问

  # 备份服务
  backup:
    build:
      context: .
      dockerfile: Dockerfile.journal
    container_name: opc200-backup
    restart: "no"  # 由 cron 触发
    volumes:
      - gateway-data:/data/gateway:ro
      - journal-data:/data/journal:ro
      - ./backups:/backups
      - ./scripts/maintenance:/scripts:ro
    environment:
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
      - BACKUP_ENCRYPT=${BACKUP_ENCRYPT:-true}
      - BACKUP_PASSWORD=${BACKUP_PASSWORD}
    command: python /scripts/backup.py --output /backups
    networks:
      - opc200-internal
    profiles:
      - backup

# 网络配置
networks:
  opc200-internal:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.0.0/16

# 存储卷
volumes:
  gateway-data:
    driver: local
  journal-data:
    driver: local
  qdrant-data:
    driver: local
  tailscale-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
