apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://opc200-prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      manageAlerts: false
      prometheusType: Prometheus
      prometheusVersion: "2.49.1"
      cacheLevel: 'High'
      incrementalQuerying: true
      incrementalQueryInitDelay: 0ms
      disableRecordingRules: false
