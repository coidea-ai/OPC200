global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # 抓取 Pushgateway 本身
  - job_name: 'pushgateway'
    static_configs:
      - targets: ['pushgateway:9091']
    honor_labels: true  # 保留用户推送的 labels（如 tenant_id）

  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
