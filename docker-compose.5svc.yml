# OPC200 5服务部署配置（不含 Tailscale）
# Gateway + Journal + Qdrant + Prometheus + Grafana

version: "3.8"

services:
  # 向量数据库（先启动）
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: opc200-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - opc200-internal
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
    # 内存限制
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M

  # Journal 服务（简化版）
  journal:
    build:
      context: .
      dockerfile: Dockerfile.light
    container_name: opc200-journal
    restart: unless-stopped
    volumes:
      - journal-data:/data/journal
      - ./logs/journal:/var/log/opc200
    environment:
      - OPC200_DATA_DIR=/data
      - QDRANT_HOST=qdrant
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - opc200-internal
    depends_on:
      - qdrant
    deploy:
      resources:
        limits:
          memory: 1G

  # Gateway（简化版）
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.light
    container_name: opc200-gateway
    restart: unless-stopped
    ports:
      - "18889:8000"
    volumes:
      - gateway-data:/data
      - ./logs/gateway:/var/log/opc200
    environment:
      - OPC200_GATEWAY_TOKEN=${OPC200_GATEWAY_TOKEN:-test-token}
      - OPC200_DATA_DIR=/data
    networks:
      - opc200-internal
    depends_on:
      - journal
    deploy:
      resources:
        limits:
          memory: 512M

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: opc200-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    networks:
      - opc200-internal
    deploy:
      resources:
        limits:
          memory: 512M

  # Grafana 可视化
  grafana:
    image: grafana/grafana:10.3.1
    container_name: opc200-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    networks:
      - opc200-internal
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  opc200-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  gateway-data:
  journal-data:
  qdrant-data:
  prometheus-data:
  grafana-data:
