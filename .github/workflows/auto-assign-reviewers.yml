# =============================================================================
# Auto Assign Reviewers
# =============================================================================
# Automatically assigns reviewers based on CODEOWNERS and changed files
# =============================================================================

name: 👥 Auto Assign Reviewers

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  assign-reviewers:
    name: Assign Code Reviewers
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed files
        id: changed-files
        run: |
          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD || echo "")
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Parse CODEOWNERS
        id: parse-owners
        run: |
          # Parse CODEOWNERS and find matching owners for changed files
          CHANGED_FILES="${{ steps.changed-files.outputs.changed_files }}"
          
          # Initialize arrays for owners
          declare -A OWNERS
          
          # Read CODEOWNERS
          while IFS= read -r line || [[ -n "$line" ]]; do
            # Skip comments and empty lines
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "${line// }" ]] && continue
            
            # Extract pattern and owners
            pattern=$(echo "$line" | awk '{print $1}')
            owner_list=$(echo "$line" | cut -d' ' -f2-)
            
            # Check if any changed file matches this pattern
            for file in $CHANGED_FILES; do
              # Convert glob pattern to regex
              regex=$(echo "$pattern" | sed 's/\./\\./g' | sed 's/\*/.*/g' | sed 's/\?/./g')
              
              if [[ "$file" =~ ^$regex$ ]] || [[ "$file" == $pattern* ]]; then
                # Add owners to set
                for owner in $owner_list; do
                  if [[ "$owner" == @* ]]; then
                    OWNERS["$owner"]=1
                  fi
                done
              fi
            done
          done < .github/CODEOWNERS
          
          # Convert to comma-separated list
          OWNER_LIST=$(echo "${!OWNERS[@]}" | tr ' ' ',' | sed 's/^,//')
          
          echo "owners=$OWNER_LIST" >> $GITHUB_OUTPUT
          echo "Found owners: $OWNER_LIST"

      - name: Assign reviewers
        if: steps.parse-owners.outputs.owners != ''
        uses: actions/github-script@v7
        with:
          script: |
            const owners = '${{ steps.parse-owners.outputs.owners }}'.split(',').filter(o => o);
            
            // Remove @ prefix and filter out PR author
            const reviewers = owners
              .map(o => o.replace(/^@/, ''))
              .filter(o => !o.includes('/') && o !== context.actor);
            
            if (reviewers.length === 0) {
              console.log('No individual reviewers to assign');
              return;
            }
            
            console.log('Assigning reviewers:', reviewers);
            
            // Request reviewers
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              reviewers: reviewers.filter(r => !r.includes('-')) // Filter out team names for now
            });
            
            // Also add comment mentioning teams
            const teams = owners.filter(o => o.includes('/'));
            if (teams.length > 0) {
              const teamMentions = teams.map(t => `@${t.replace(/^@/, '')}`).join(', ');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `👋 需要以下团队的审查：${teamMentions}\n\n根据 CODEOWNERS 规则自动分配。`
              });
            }

      - name: Add helpful comment for first-time contributors
        if: github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            // Check if this is a draft PR
            if (pr.draft) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `📝 **Draft PR Detected**\n\n当你准备好审查时，请点击 "Ready for review" 按钮。`
              });
            }
