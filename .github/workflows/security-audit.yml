name: Security Audit

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety detect-secrets pip-audit

      - name: Run dependency vulnerability scan
        run: |
          echo "## Dependency Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
          safety check --json || true
          pip-audit --format=json || true

      - name: Run static code analysis
        run: |
          echo "## Static Code Security Analysis" >> $GITHUB_STEP_SUMMARY
          bandit -r src/ -f json -o bandit-report.json || true
          bandit -r src/ -f txt || true

      - name: Scan for secrets
        run: |
          echo "## Secret Detection Scan" >> $GITHUB_STEP_SUMMARY
          detect-secrets scan --all-files --force-use-all-plugins > .secrets.baseline
          detect-secrets audit .secrets.baseline

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            .secrets.baseline

      - name: Check for critical vulnerabilities
        run: |
          # Fail if bandit finds high severity issues
          if [ -f bandit-report.json ]; then
            critical_count=$(cat bandit-report.json | python -c "import sys,json; data=json.load(sys.stdin); print(len([r for r in data.get('results',[]) if r.get('issue_severity') in ('HIGH', 'CRITICAL')]))" || echo "0")
            if [ "$critical_count" -gt 0 ]; then
              echo "::error::Found $critical_count critical/high severity security issues"
              exit 1
            fi
          fi
