name: OPC200 Automated Validation Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
  schedule:
    # 每天凌晨 2 点运行全量验证
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      deployment_target:
        description: 'Deployment target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - pilot
          - production
      skip_tests:
        description: 'Skip test phase (dangerous)'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.12'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # =============================================================================
  # Phase 1: Code Quality & Security Scan
  # =============================================================================
  code-quality:
    name: 🔍 Code Quality & Security
    runs-on: ubuntu-latest
    outputs:
      security_passed: ${{ steps.security-check.outputs.passed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install bandit safety detect-secrets

      - name: Run flake8 linting
        run: |
          flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run bandit security scan
        id: security-check
        run: |
          bandit -r src/ -f json -o bandit-report.json || true
          bandit -r src/ --severity-level medium --confidence-level medium
          echo "passed=true" >> $GITHUB_OUTPUT

      - name: Run safety check
        run: safety check --json || true

      - name: Scan for secrets
        run: |
          detect-secrets scan --all-files --force-use-all-plugins > .secrets.baseline
          detect-secrets audit .secrets.baseline || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            .secrets.baseline

  # =============================================================================
  # Phase 2: Type Checking & Static Analysis
  # =============================================================================
  static-analysis:
    name: 📊 Static Analysis
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mypy

      - name: Run mypy type checking
        run: mypy src --ignore-missing-imports --show-error-codes

      - name: Generate type coverage report
        run: |
          mypy src --ignore-missing-imports --linecount-report reports/

  # =============================================================================
  # Phase 3: Test Matrix
  # =============================================================================
  test-matrix:
    name: 🧪 Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [code-quality, static-analysis]
    if: ${{ !inputs.skip_tests }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit -v --cov=src --cov-report=xml --cov-report=term-missing --junitxml=junit-unit.xml

      - name: Run security tests
        run: pytest tests/security -v --junitxml=junit-security.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            junit-*.xml
            coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests-py${{ matrix.python-version }}
          name: codecov-py${{ matrix.python-version }}
          fail_ci_if_error: false

  # =============================================================================
  # Phase 4: Integration Tests
  # =============================================================================
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: test-matrix
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Wait for Qdrant
        run: |
          for i in {1..30}; do
            curl -s http://localhost:6333/ && break
            sleep 2
          done

      - name: Run integration tests
        run: pytest tests/integration -v --timeout=120 --junitxml=junit-integration.xml
        env:
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: junit-integration.xml

  # =============================================================================
  # Phase 5: Performance Tests
  # =============================================================================
  performance-tests:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install pytest-benchmark

      - name: Run performance benchmarks
        run: pytest tests/performance -v --benchmark-only --benchmark-json=benchmark.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.json

  # =============================================================================
  # Phase 6: Build & Push Container Image
  # =============================================================================
  build-image:
    name: 🐳 Build Container Image
    runs-on: ubuntu-latest
    needs: [test-matrix, integration-tests]
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.sarif

  # =============================================================================
  # Phase 7: Staging Deployment & Validation
  # =============================================================================
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-image
    if: github.ref == 'refs/heads/develop' || inputs.deployment_target == 'staging'
    environment:
      name: staging
      url: https://staging.opc200.coidea.ai
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # 实际部署脚本
          # ./scripts/deploy/deploy-cloud.sh --env staging --image ${{ needs.build-image.outputs.image_tag }}

      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."
          # curl -f https://staging.opc200.coidea.ai/health || exit 1

      - name: Run E2E tests
        run: pytest tests/e2e -v --timeout=300

  # =============================================================================
  # Phase 8: Pilot Deployment (Limited Rollout)
  # =============================================================================
  deploy-pilot:
    name: 🎯 Deploy to Pilot
    runs-on: ubuntu-latest
    needs: [build-image, deploy-staging]
    if: github.ref == 'refs/heads/main' && (inputs.deployment_target == 'pilot' || inputs.deployment_target == 'production')
    environment:
      name: pilot
      url: https://pilot.opc200.coidea.ai
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to pilot (10 users)
        run: |
          echo "Deploying to 10 pilot users..."
          # ./scripts/deploy/batch-deploy.sh --count 10 --env pilot --image ${{ needs.build-image.outputs.image_tag }}

      - name: Validate pilot deployment
        run: |
          echo "Validating pilot deployment..."
          # ./scripts/maintenance/health-check.sh --env pilot

      - name: Collect pilot metrics
        run: |
          echo "Collecting metrics from pilot..."
          # 收集错误率、响应时间等指标

  # =============================================================================
  # Phase 9: Production Deployment (Gradual Rollout)
  # =============================================================================
  deploy-production:
    name: 🏭 Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-pilot
    if: github.ref == 'refs/heads/main' && inputs.deployment_target == 'production'
    environment:
      name: production
      url: https://opc200.coidea.ai
    strategy:
      matrix:
        batch: [1, 2, 3, 4]
      max-parallel: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy batch ${{ matrix.batch }}
        run: |
          BATCH_SIZE=50
          echo "Deploying batch ${{ matrix.batch }} ($BATCH_SIZE instances)..."
          # ./scripts/deploy/batch-deploy.sh \
          #   --start $(( (${{ matrix.batch }} - 1) * BATCH_SIZE + 1 )) \
          #   --count $BATCH_SIZE \
          #   --env production \
          #   --image ${{ needs.build-image.outputs.image_tag }}

      - name: Health check batch ${{ matrix.batch }}
        run: |
          echo "Health checking batch ${{ matrix.batch }}..."
          # ./scripts/maintenance/health-check.sh --env production --batch ${{ matrix.batch }}
          sleep 300  # 等待 5 分钟观察稳定性

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Rolling back batch ${{ matrix.batch }}..."
          # ./scripts/recovery/rollback.sh --env production --batch ${{ matrix.batch }}

  # =============================================================================
  # Phase 10: Post-Deployment Validation
  # =============================================================================
  post-deployment:
    name: ✅ Post-Deployment Validation
    runs-on: ubuntu-latest
    needs: deploy-production
    if: always() && needs.deploy-production.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run full health check
        run: |
          echo "Running full health check..."
          # ./scripts/maintenance/health-check.sh --env production --full

      - name: Validate all skills
        run: |
          echo "Validating all skills..."
          # 验证 5 个核心技能都正常工作

      - name: Generate deployment report
        run: |
          echo "# Deployment Report" > deployment-report.md
          echo "- Image: ${{ needs.build-image.outputs.image_tag }}" >> deployment-report.md
          echo "- Digest: ${{ needs.build-image.outputs.image_digest }}" >> deployment-report.md
          echo "- Time: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment-report.md

      - name: Upload deployment report
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report
          path: deployment-report.md

  # =============================================================================
  # Notification
  # =============================================================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [code-quality, test-matrix, build-image]
    if: always()
    continue-on-error: true
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#opc200-deployments'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
