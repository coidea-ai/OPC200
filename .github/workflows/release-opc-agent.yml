  #
  #     - name: Build bundle
  #       run: bash agent/scripts/build-agent-bundle.sh "${{ steps.ver.outputs.ver }}" bundle-out
  #
  #     - name: Zip and SHA256SUMS
  #       run: |
  #         (cd bundle-out && zip -r "../opc200-agent-${{ steps.ver.outputs.ver }}.zip" agent)
  #         sha256sum "opc200-agent-${{ steps.ver.outputs.ver }}.zip" > SHA256SUMS
  #
  #     - name: Upload release assets
  #       uses: softprops/action-gh-release@v2
  #       with:
  #         files: |
  #           opc200-agent-${{ steps.ver.outputs.ver }}.zip
  #           SHA256SUMS
  #           agent/scripts/opc200-install.ps1
  #           agent/scripts/opc200-install.sh

  openclaw-installer-win-zip:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"

      - name: Restore openclaw npm cache
        id: openclaw-cache
        uses: actions/cache@v4
        with:
          path: agent/scripts/openclaw-npm-cache
          key: openclaw-npm-cache-windows-openclaw-2026.4.15-v2

      - name: Populate openclaw npm cache (offline install)
        if: steps.openclaw-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $cache = "agent/scripts/openclaw-npm-cache"
          New-Item -ItemType Directory -Force -Path $cache | Out-Null
          npm install -g openclaw@2026.4.15 --cache $cache --registry https://registry.npmjs.org/

      - name: Verify openclaw cache works offline
        shell: pwsh
        run: |
          $cache = (Resolve-Path "agent/scripts/openclaw-npm-cache").Path
          $probe = "agent/scripts/.offline-openclaw-probe"
          if (Test-Path -LiteralPath $probe) { Remove-Item -LiteralPath $probe -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $probe | Out-Null
          npm install --prefix $probe openclaw@2026.4.15 --offline --cache $cache --registry https://registry.npmjs.org/ --prefer-offline --no-audit --no-fund
          Remove-Item -LiteralPath $probe -Recurse -Force

      - name: Download Node 24.15.0 offline bundles
        shell: pwsh
        run: |
          $d = "agent/scripts/node-v24.15.0"
          New-Item -ItemType Directory -Force -Path $d | Out-Null
          $base = "https://nodejs.org/dist/v24.15.0"
          foreach ($name in @("node-v24.15.0-win-x64.zip", "node-v24.15.0-win-x86.zip")) {
            $out = Join-Path $d $name
            Invoke-WebRequest -Uri "$base/$name" -OutFile $out -UseBasicParsing
          }

      - name: Build OpenClawInstaller-win-YYYY.M.D.zip
        shell: pwsh
        run: |
          Set-Location agent/scripts
          powershell -ExecutionPolicy Bypass -File .\build-openclaw-installer-exe.ps1
          powershell -ExecutionPolicy Bypass -File .\build-openclaw-uninstaller-exe.ps1
          powershell -ExecutionPolicy Bypass -File .\pack-openclaw-installer-release.ps1

      - name: Upload OpenClawInstaller-win-YYYY.M.D.zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: agent/scripts/dist/OpenClawInstaller-win-*.zip
