# 方案 2：单一 v* Release。当前仅发布 OpenClaw 安装器（OpenClawInstaller-win-YYYY.M.D.zip）。
# OPC200 安装器/制品包流水线待重构后再启用下方 `release` job。

name: Release v* artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # --- OPC200 Agent 制品（opc200-agent zip / SHA256SUMS / bootstrap）— 重构前暂停 ---
