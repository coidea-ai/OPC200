name: Release OPC200 agent bundle

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: echo "ver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build bundle
        run: bash agent/scripts/build-agent-bundle.sh "${{ steps.ver.outputs.ver }}" bundle-out

      - name: Zip and SHA256SUMS
        run: |
          (cd bundle-out && zip -r "../opc200-agent-${{ steps.ver.outputs.ver }}.zip" agent)
          sha256sum "opc200-agent-${{ steps.ver.outputs.ver }}.zip" > SHA256SUMS

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            opc200-agent-${{ steps.ver.outputs.ver }}.zip
            SHA256SUMS
            agent/scripts/opc200-install.ps1
