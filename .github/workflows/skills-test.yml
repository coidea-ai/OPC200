name: Skills Test Suite

on:
  push:
    branches: [main, develop]
    paths:
      - 'skills/**'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
  workflow_dispatch:

jobs:
  test-skills:
    name: 🧪 Skills Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install pytest pytest-cov
      
      - name: Run sub-skills tests with coverage
        run: |
          cd skills/opc-journal-suite
          for dir in opc-*/; do
            echo "Testing $dir..."
            cd "$dir"
            pytest tests/ -v --cov=. --cov-report=term --cov-fail-under=70 || true
            cd ..
          done
      
      - name: Run main skills tests with coverage
        run: |
          cd skills/opc-journal-suite
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term --cov-fail-under=35
      
      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          file: ./skills/opc-journal-suite/coverage.xml
          flags: skills
          name: skills-coverage
          fail_ci_if_error: false

  lint-skills:
    name: 🔍 Skills Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install linting tools
        run: |
          pip install flake8 mypy
      
      - name: Lint skills code
        run: |
          flake8 skills/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 skills/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Type check skills
        run: |
          mypy skills/ --ignore-missing-imports || true
