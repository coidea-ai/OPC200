name: Publish Skills to ClawHub

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 2.4.2)'
        required: true
        default: '2.4.3'
      dry_run:
        description: 'Dry run (no actual publish)'
        required: true
        type: boolean
        default: false

env:
  NODE_VERSION: '20'

jobs:
  publish-opc-journal:
    name: 📦 Publish OPC Journal
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Verify ClawHub CLI
        run: clawhub -V

      - name: Configure ClawHub Auth
        run: |
          clawhub login --token "${{ secrets.CLAWHUB_TOKEN }}"
          clawhub whoami

      - name: Dry Run - Validate Package
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "🔍 Dry run mode - validating opc-journal..."
          ls -la skills/opc-journal/
          cat skills/opc-journal/SKILL.md | head -30
          echo "✅ Package structure validated"

      - name: Publish opc-journal to ClawHub
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          echo "📤 Publishing opc-journal v${{ github.event.inputs.version }}..."
          cd skills/opc-journal
          clawhub publish . \
            --slug opc-journal \
            --name "OPC Journal" \
            --version ${{ github.event.inputs.version }} \
            --changelog "Single CLI skill for OPC journaling, pattern analysis, milestones, insights and task tracking. LOCAL-ONLY."
          echo "✅ opc-journal published successfully"

  notify:
    name: 📢 Notify Completion
    runs-on: ubuntu-latest
    needs: publish-opc-journal
    if: always()
    
    steps:
      - name: Publish Summary
        run: |
          echo "## 🎯 ClawHub Publish Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Version | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| opc-journal | ${{ github.event.inputs.version }} | ${{ needs.publish-opc-journal.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install Commands" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'clawhub install coidea/opc-journal@${{ github.event.inputs.version }}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
