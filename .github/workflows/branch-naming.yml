# =============================================================================
# Branch Naming Convention
# =============================================================================
# Validates branch names follow the project naming conventions
# =============================================================================

name: 🌿 Branch Naming

on:
  create:
    branches:
      - '*'
  pull_request:
    types: [opened, reopened]

jobs:
  check-branch-name:
    name: Validate Branch Name
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check branch name
        run: |
          if [ "${{ github.event_name }}" == "create" ]; then
            BRANCH_NAME="${{ github.ref }}"
            # Remove refs/heads/ prefix
            BRANCH_NAME="${BRANCH_NAME#refs/heads/}"
          else
            BRANCH_NAME="${{ github.head_ref }}"
          fi
          
          echo "Checking branch name: $BRANCH_NAME"
          
          # Protected branches - always allowed
          if [[ "$BRANCH_NAME" == "main" ]] || [[ "$BRANCH_NAME" == "master" ]] || [[ "$BRANCH_NAME" == "develop" ]]; then
            echo "✅ Protected branch name is valid"
            exit 0
          fi
          
          # Version/Release branches
          if [[ "$BRANCH_NAME" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "✅ Version branch name is valid"
            exit 0
          fi
          
          if [[ "$BRANCH_NAME" =~ ^release/[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "✅ Release branch name is valid"
            exit 0
          fi
          
          # Feature branches
          if [[ "$BRANCH_NAME" =~ ^feature/[a-z0-9-]+$ ]]; then
            echo "✅ Feature branch name is valid"
            exit 0
          fi
          
          # Bug fix branches
          if [[ "$BRANCH_NAME" =~ ^fix/[a-z0-9-]+$ ]]; then
            echo "✅ Fix branch name is valid"
            exit 0
          fi
          
          # Hotfix branches
          if [[ "$BRANCH_NAME" =~ ^hotfix/[a-z0-9-]+$ ]]; then
            echo "✅ Hotfix branch name is valid"
            exit 0
          fi
          
          # Documentation branches
          if [[ "$BRANCH_NAME" =~ ^docs/[a-z0-9-]+$ ]]; then
            echo "✅ Docs branch name is valid"
            exit 0
          fi
          
          # Refactor branches
          if [[ "$BRANCH_NAME" =~ ^refactor/[a-z0-9-]+$ ]]; then
            echo "✅ Refactor branch name is valid"
            exit 0
          fi
          
          # Test branches
          if [[ "$BRANCH_NAME" =~ ^test/[a-z0-9-]+$ ]]; then
            echo "✅ Test branch name is valid"
            exit 0
          fi
          
          # CI/Build branches
          if [[ "$BRANCH_NAME" =~ ^ci/[a-z0-9-]+$ ]]; then
            echo "✅ CI branch name is valid"
            exit 0
          fi
          
          # Dependabot/Renovate branches
          if [[ "$BRANCH_NAME" =~ ^dependabot/ ]] || [[ "$BRANCH_NAME" =~ ^renovate/ ]]; then
            echo "✅ Dependency update branch name is valid"
            exit 0
          fi
          
          # Invalid branch name
          echo "❌ Invalid branch name: $BRANCH_NAME"
          echo ""
          echo "Branch names must follow the pattern: <type>/<description>"
          echo ""
          echo "Valid types:"
          echo "  feature/*   - New features"
          echo "  fix/*       - Bug fixes"
          echo "  hotfix/*    - Critical production fixes"
          echo "  docs/*      - Documentation changes"
          echo "  refactor/*  - Code refactoring"
          echo "  test/*      - Test additions/changes"
          echo "  ci/*        - CI/CD changes"
          echo "  release/*   - Release preparation"
          echo "  v*          - Version tags (e.g., v1.0.0)"
          echo ""
          echo "Examples:"
          echo "  feature/user-authentication"
          echo "  fix/null-pointer-exception"
          echo "  docs/api-reference"
          echo "  hotfix/security-patch"
          echo "  release/2.0.0"
          echo ""
          
          # Don't fail on PR from forks or external contributions
          if [ "${{ github.event.pull_request.head.repo.fork }}" == "true" ]; then
            echo "⚠️  Branch is from a fork - allowing with warning"
            exit 0
          fi
          
          exit 1
