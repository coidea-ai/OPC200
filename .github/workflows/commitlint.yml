# =============================================================================
# Commit Message Lint
# =============================================================================
# Validates commit messages follow Conventional Commits format
# https://www.conventionalcommits.org/
# =============================================================================

name: 📝 Commit Message Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - develop
      - 'release/*'

jobs:
  commitlint:
    name: Check Commit Messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required to get commit history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check commit messages
        run: |
          # Get the range of commits to check
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            echo "Checking commits in PR: $BASE_SHA..$HEAD_SHA"
          else
            # For push events, check the last commit
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.event.after }}"
            echo "Checking commits in push: $BASE_SHA..$HEAD_SHA"
          fi
          
          # Handle initial commit (no parent)
          if [ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]; then
            echo "Initial commit detected, checking only HEAD"
            COMMITS="${{ github.event.after }}"
          else
            COMMITS=$(git rev-list "$BASE_SHA..$HEAD_SHA")
          fi
          
          # Check each commit
          INVALID_COMMITS=0
          
          for commit in $COMMITS; do
            echo "Checking commit: $commit"
            git show -s --format=%B "$commit" > /tmp/commit_msg.txt
            
            if ! python .github/scripts/check_commit_msg.py /tmp/commit_msg.txt; then
              echo "❌ Commit $commit failed validation"
              echo "Commit message:"
              git show -s --format=%B "$commit"
              echo "---"
              INVALID_COMMITS=$((INVALID_COMMITS + 1))
            fi
          done
          
          if [ $INVALID_COMMITS -gt 0 ]; then
            echo ""
            echo "❌ $INVALID_COMMITS commit(s) failed validation"
            echo ""
            echo "Commit messages must follow Conventional Commits format:"
            echo "  <type>[(scope)][!]: <subject>"
            echo ""
            echo "Valid types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            echo ""
            echo "Examples:"
            echo "  feat: add user authentication"
            echo "  fix(api): resolve null pointer exception"
            echo "  feat(skills)!: breaking change in journal API"
            echo "  docs: update README with setup instructions"
            exit 1
          fi
          
          echo "✅ All commit messages are valid!"

      - name: PR Title Check
        if: github.event_name == 'pull_request'
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "Checking PR title: $PR_TITLE"
          
          # PR titles should also follow conventional format
          echo "$PR_TITLE" > /tmp/pr_title.txt
          
          # More lenient for PR titles - just check basic format
          if echo "$PR_TITLE" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z-]+\))?!?: .+"; then
            echo "✅ PR title follows Conventional Commits format"
          else
            echo "⚠️  PR title doesn't follow Conventional Commits format"
            echo "Expected: <type>[(scope)][!]: <subject>"
            echo "Valid types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            # Don't fail the build for PR title, just warn
          fi
