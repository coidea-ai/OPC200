name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke tests
        run: |
          pytest tests/e2e -v -k "smoke" --timeout=300 || echo "No smoke tests found"

      - name: Build Docker image
        run: |
          docker build -f Dockerfile.test -t opc200:staging .

      - name: Push to GitHub Packages
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag opc200:staging ghcr.io/${{ github.repository_owner }}/opc200:staging
          docker push ghcr.io/${{ github.repository_owner }}/opc200:staging

      - name: Deploy to staging environment
        run: |
          echo "Deploying to staging environment..."
          # Add actual deployment commands here
          # kubectl set image deployment/opc200 opc200=ghcr.io/${{ github.repository_owner }}/opc200:staging

      - name: Run health check
        run: |
          echo "Running health check on staging..."
          # Add health check commands
          # curl -f https://staging.opc200.co/health || exit 1

      - name: Notify deployment status
        if: always()
        run: |
          echo "Deployment to staging completed with status: ${{ job.status }}"
