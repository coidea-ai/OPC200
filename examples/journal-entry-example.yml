# 类型7: 学习记录 (learning)
entry_learning:
  id: "a7b8c9d0e1f23456"
  timestamp: "2026-03-24T21:30:00+08:00"
  entry_type: "thought"
  content: |
    学习了 Tailscale 的 ACL 配置，理解了如何通过网络标签实现细粒度访问控制。
    
    关键要点：
    - tag:opc 用于标记客户节点
    - group:support 用于支持团队
    - 默认拒绝策略更安全
  metadata:
    topic: "Tailscale ACL"
    source: "官方文档"
    time_spent_minutes: 45
    related_skills: ["networking", "security"]
  tags: ["学习", "Tailscale", "网络"]
  sentiment: 0.7

# 批量导入示例
batch_entries:
  entries:
    - ${entry_thought}
    - ${entry_action}
    - ${entry_milestone}
    - ${entry_insight}
  
  import_options:
    skip_duplicates: true
    validate_schema: true
    generate_summaries: true
