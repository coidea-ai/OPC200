version: '3.8'

services:
  opc200:
    build:
      context: .
      dockerfile: Dockerfile.prod
    environment:
      - PYTHONPATH=/app/src
      - OPC200_ENV=production
      - DATABASE_PATH=/data/journal.db
    volumes:
      - opc200_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  opc200_data:
  qdrant_storage:
