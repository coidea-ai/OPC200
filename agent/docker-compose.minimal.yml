# OPC200 用户侧最小化部署配置
# 核心服务：Gateway + Exporter（Journal 和 Qdrant 已移除，由平台侧提供）
# 用于 4/24 老板试用部署

version: "3.8"

env_file:
  - .env.minimal

services:
  # OpenClaw Gateway（用户侧核心）
  gateway:
    build:
      context: ../..
      dockerfile: agent/src/gateway/Dockerfile.gateway
    container_name: opc200-gateway-${INSTANCE_ID:-001}
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-18789}:18789"
    volumes:
      - gateway-data:/data
      - ./config/gateway.yml:/etc/opc200/gateway.yml:ro
      - ./skills:/app/skills:ro
    environment:
      OPC200_GATEWAY_TOKEN: ${OPC200_GATEWAY_TOKEN:-opc200-test-token}
      OPC200_DATA_DIR: /data
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      INSTANCE_ID: ${INSTANCE_ID:-opc-001}
    networks:
      - opc200-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Exporter（指标推送到平台）
  exporter:
    build:
      context: ../..
      dockerfile: agent/Dockerfile.exporter
    container_name: opc200-exporter-${INSTANCE_ID:-001}
    restart: unless-stopped
    volumes:
      - exporter-data:/data/exporter
    environment:
      PLATFORM_URL: ${PLATFORM_URL:-http://opc200.meerkatai.cn:9091}
      TENANT_ID: ${TENANT_ID:-opc-001}
      API_KEY: ${API_KEY:-}
      PUSH_INTERVAL: "60"
      HTTPS_PROXY: ${HTTPS_PROXY:-}
    networks:
      - opc200-internal
    depends_on:
      - gateway

networks:
  opc200-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  gateway-data:
    driver: local
  exporter-data:
    driver: local
