# OPC200 Skills 配置
# OpenClaw Skills 安装和管理配置

# Skills 源配置
sources:
  # 官方 ClawHub
  clawhub:
    url: "https://clawhub.ai"
    enabled: true
    trust_level: "verified"  # verified / community / all
  
  # 私有 Registry（企业客户）
  private:
    url: "${OPC200_PRIVATE_REGISTRY_URL}"
    enabled: false
    auth:
      type: "token"
      token: "${OPC200_REGISTRY_TOKEN}"

# OPC200 核心 Skills 套件
opc_journal_suite:
  # 套件总控
  suite:
    name: "opc-journal-suite"
    version: "2.2.0"
    auto_update: true
    update_channel: "stable"  # stable / beta / dev
  
  # 子 Skills
  components:
    - name: "opc-journal-core"
      version: "2.2.0"
      enabled: true
      config:
        # 日志存储配置
        storage:
          type: "sqlite"  # sqlite / postgresql
          path: "${OPC200_DATA_DIR}/journal.db"
        
        # 向量存储配置
        vector_store:
          type: "qdrant"  # memory / qdrant
          host: "localhost"
          port: 6333
          collection: "journal_entries"
        
        # 嵌入配置
        embedding:
          provider: "openai"  # openai / local / simple
          model: "text-embedding-3-small"
          # api_key 从环境变量读取：OPENAI_API_KEY
    
    - name: "opc-pattern-recognition"
      version: "2.2.0"
      enabled: true
      config:
        # 分析频率
        analysis_interval_hours: 24
        
        # 最小数据量
        min_entries_for_analysis: 10
        
        # 模式保存
        storage:
          path: "${OPC200_DATA_DIR}/patterns.db"
    
    - name: "opc-milestone-tracker"
      version: "2.2.0"
      enabled: true
      config:
        # 里程碑检测配置
        milestones:
          consistency:
            - days: 7
              title: "7天连续记录"
              celebration: "🎉 一周坚持！"
            - days: 30
              title: "30天连续记录"
              celebration: "🌟 一个月里程碑！"
            - days: 100
              title: "百日成就"
              celebration: "🏆 百日成就达成！"
          
          volume:
            - count: 50
              title: "记录达人"
              celebration: "📝 50条记录达成！"
            - count: 100
              title: "记录大师"
              celebration: "📚 100条记录达成！"
        
        # 通知配置
        notifications:
          enabled: true
          channels:
            - "ui"
            - "feishu"
    
    - name: "opc-async-task-manager"
      version: "2.2.0"
      enabled: true
      config:
        # 任务调度配置
        scheduler:
          max_workers: 5
          queue_size: 100
        
        # 存储配置
        storage:
          path: "${OPC200_DATA_DIR}/tasks.db"
        
        # 默认重试配置
        retry:
          max_attempts: 3
          backoff: "exponential"  # fixed / exponential
    
    - name: "opc-insight-generator"
      version: "2.2.0"
      enabled: true
      config:
        # 洞察生成频率
        generation_schedule:
          daily_digest: "08:00"  # 每天早上8点
          weekly_report: "sun_20:00"  # 周日晚8点
        
        # 存储配置
        storage:
          path: "${OPC200_DATA_DIR}/insights.db"
        
        # 洞察类别权重
        categories:
          productivity:
            weight: 1.0
            enabled: true
          wellbeing:
            weight: 1.2  # 提高健康权重
            enabled: true
          learning:
            weight: 1.0
            enabled: true
          collaboration:
            weight: 0.8
            enabled: true

# 第三方 Skills（可选）
third_party:
  # 多 Agent 编排
  - name: "agent-team-orchestration"
    source: "clawhub"
    author: "arminnaimi"
    enabled: true
    version: "latest"
  
  # 系统健康维护
  - name: "active-maintenance"
    source: "clawhub"
    author: "xiaowenzhou"
    enabled: true
    version: "latest"
  
  # Agent 记忆管理
  - name: "agent-memory"
    source: "clawhub"
    author: "dennis-da-menace"
    enabled: true
    version: "latest"

# Skills 安全策略
security:
  # 代码签名验证
  signature_verification: true
  
  # 权限审查
  permission_review:
    enabled: true
    block_dangerous: true  # 阻止具有危险权限的 Skills
    dangerous_permissions:
      - "exec:shell"
      - "file:write:/etc"
      - "network:outbound:*"
  
  # 沙箱配置
  sandbox:
    enabled: true
    network_isolation: true
    filesystem_isolation: true
    allowed_paths:
      - "${OPC200_DATA_DIR}"
      - "/tmp/opc200"
  
  # 自动更新安全
  auto_update:
    enabled: true
    security_only: false  # 设为 true 只自动更新安全补丁
    review_required_for:
      - "major"  # 主版本更新需要审查

# Skills 性能配置
performance:
  # 内存限制
  memory_limit_mb: 512
  
  # CPU 限制
  cpu_limit_percent: 50
  
  # 超时配置
  timeout:
    default_seconds: 30
    long_running_seconds: 300
  
  # 缓存配置
  cache:
    enabled: true
    ttl_seconds: 3600
    max_size_mb: 100
