# OPC Journal Suite Configuration
# Version: 2.4.0-refactored

# IMPORTANT: This is a LOCAL-ONLY journaling system.
# No network calls, no external APIs, no data sharing.
# All data is stored in customer-scoped local directories only.

journal:
  storage_path: "customers/{customer_id}/journal/"
  retention_days: 365
  privacy_level: "standard"  # standard / sensitive / vault
  
  # Auto-compaction settings (local only)
  compaction:
    enabled: true
    reserve_tokens_floor: 40000
    memory_flush:
      soft_threshold_tokens: 4000
      system_prompt: "Session nearing compaction. Store durable memories now."
      prompt: "Write any lasting notes to memory/YYYY-MM-DD.md; reply with NO_REPLY if nothing to store."

pattern_recognition:
  # v2.4 重构: 不再自己做分析，而是读取 OpenClaw dreaming output，做 OPC 特定解读
  mode: "interpretation_layer"
  source: "openclaw_dreams"
  analysis_frequency: "weekly"
  insight_depth: "detailed"
  dimensions:
    - work_hours
    - decision_style
    - stress_triggers

milestone:
  auto_detect: true
  celebration_enabled: true
  min_confidence: 0.7
  types:
    - product_launch
    - first_customer
    - revenue_milestone
    - team_expansion
    - feature_completion

async_task:
  # LEGACY: OpenClaw Task Flow + /tasks 面板已覆盖此能力
  # 保留配置仅用于向后兼容
  status: "legacy"
  max_concurrent: 5
  default_timeout: "8h"
  retry_policy:
    max_retries: 3
    backoff: "exponential"

insight:
  # v2.4 重构: 数据源从自研分析切换到 dreaming output + OPC 业务上下文
  generation_frequency: "daily"
  include_recommendations: true
  personalization_enabled: true
  data_sources:
    - openclaw_dreams
    - openclaw_memory
    - opc_journal_context

cron_scheduler:
  enabled: true
  check_interval: "5m"
  
  schedules:
    daily_summary:
      enabled: true
      schedule: "0 8 * * *"
      description: "Generate daily summary"
      target_skill: "opc-insight-generator"
      
    weekly_pattern:
      enabled: true
      schedule: "0 9 * * 0"
      description: "Weekly pattern analysis (interpretation layer)"
      target_skill: "opc-pattern-recognition"
      
    milestone_check:
      enabled: true
      schedule: "0 21 * * *"
      description: "Daily milestone detection"
      target_skill: "opc-milestone-tracker"
      
    memory_compaction:
      enabled: true
      schedule: "0 23 * * *"
      description: "Daily memory compaction"
      target_skill: "opc-journal-core"

logging:
  level: "info"
  format: "json"
  retention_days: 30

# Version notes:
# v2.4.0-refactored: 
#   - Removed opc-remi-lite (covered by OpenClaw native dreaming)
#   - Marked opc-async-task-manager as legacy (covered by OpenClaw Task Flow)
#   - Re-positioned opc-pattern-recognition as interpretation layer
#   - Retained opc-milestone-tracker and opc-insight-generator as core differentiators

# Legacy skills (not installed by default):
#   - opc-remi-lite: DEPRECATED, fully covered by OpenClaw v2026.4.9+
#   - opc-async-task-manager: LEGACY, use OpenClaw /tasks panel instead
