# OPC200 Skills 配置
# OpenClaw Skills 安装和管理配置

# Skills 源配置
sources:
  # 官方 ClawHub
  clawhub:
    url: "https://clawhub.ai"
    enabled: true
    trust_level: "verified"  # verified / community / all
  
  # 私有 Registry（企业客户）
  private:
    url: "${OPC200_PRIVATE_REGISTRY_URL}"
    enabled: false
    auth:
      type: "token"
      token: "${OPC200_REGISTRY_TOKEN}"

# OPC200 核心 Skill
opc_journal:
  name: "opc-journal"
  version: "2.4.2"
  auto_update: true
  update_channel: "stable"
  enabled: true
  config:
    storage:
      type: "file"
      path: "${OPC200_DATA_DIR}/journal/"
    retention_days: 365
    privacy_level: "standard"
    pattern_recognition:
      mode: "interpretation_layer"
      analysis_frequency: "weekly"
    milestone:
      auto_detect: true
      celebration_enabled: true
    insight:
      generation_frequency: "daily"
      include_recommendations: true

# 第三方 Skills（可选）
third_party:
  # 多 Agent 编排
  - name: "agent-team-orchestration"
    source: "clawhub"
    author: "arminnaimi"
    enabled: true
    version: "latest"
  
  # 系统健康维护
  - name: "active-maintenance"
    source: "clawhub"
    author: "xiaowenzhou"
    enabled: true
    version: "latest"
  
  # Agent 记忆管理
  - name: "agent-memory"
    source: "clawhub"
    author: "dennis-da-menace"
    enabled: true
    version: "latest"

# Skills 安全策略
security:
  # 代码签名验证
  signature_verification: true
  
  # 权限审查
  permission_review:
    enabled: true
    block_dangerous: true  # 阻止具有危险权限的 Skills
    dangerous_permissions:
      - "exec:shell"
      - "file:write:/etc"
      - "network:outbound:*"
  
  # 沙箱配置
  sandbox:
    enabled: true
    network_isolation: true
    filesystem_isolation: true
    allowed_paths:
      - "${OPC200_DATA_DIR}"
      - "/tmp/opc200"
  
  # 自动更新安全
  auto_update:
    enabled: true
    security_only: false  # 设为 true 只自动更新安全补丁
    review_required_for:
      - "major"  # 主版本更新需要审查

# Skills 性能配置
performance:
  # 内存限制
  memory_limit_mb: 512
  
  # CPU 限制
  cpu_limit_percent: 50
  
  # 超时配置
  timeout:
    default_seconds: 30
    long_running_seconds: 300
  
  # 缓存配置
  cache:
    enabled: true
    ttl_seconds: 3600
    max_size_mb: 100
